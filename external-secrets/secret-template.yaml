apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: demo-app-secrets
  namespace: demo-app-prod
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: demo-app-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: demo-app/prod/db-password
    - secretKey: API_KEY
      remoteRef:
        key: demo-app/prod/api-key
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: demo-app-config
  namespace: demo-app-prod
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: demo-app-config
    creationPolicy: Owner
  data:
    - secretKey: DB_HOST
      remoteRef:
        key: /demo-app/prod/db-host
    - secretKey: DB_PORT
      remoteRef:
        key: /demo-app/prod/db-port
