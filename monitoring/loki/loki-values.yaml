loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: s3
    s3:
      s3: null
      endpoint: s3.amazonaws.com
      region: us-east-1
      bucketnames: idp-loki-logs
      insecure: false
      sse_encryption: false
      http_config: {}
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: index_
          period: 24h
  tableManager:
    retention_deletes_enabled: true
    retention_period: 720h

write:
  replicas: 1
  persistence:
    size: 10Gi

read:
  replicas: 1

gateway:
  enabled: true
  ingress:
    enabled: true
    annotations:
      kubernetes.io/ingress.class: alb
      alb.ingress.kubernetes.io/scheme: internet-facing
    hosts:
      - host: loki.idp.example.com
        paths:
          - path: /
            pathType: Prefix

monitoring:
  dashboards:
    enabled: true
  alerts:
    enabled: true
  serviceMonitor:
    enabled: true
  selfMonitoring:
    enabled: true
    grafanaAgent:
      installOperator: true
