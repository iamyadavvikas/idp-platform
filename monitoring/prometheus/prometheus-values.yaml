server:
  global:
    scrape_interval: 15s
    evaluation_interval: 15s

  persistentVolume:
    enabled: true
    size: 50Gi
    storageClass: gp3

  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 2
      memory: 4Gi

  retention: 15d

  extraFlags:
    - "web.enable-lifecycle"
    - "storage.tsdb.no-lockfile"

alertmanager:
  enabled: true
  persistentVolume:
    enabled: true
    size: 10Gi

  config:
    global:
      resolve_timeout: 5m
      slack_api_url: ""
    route:
      receiver: "default"
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - match:
            severity: critical
          receiver: "critical"
          repeat_interval: 10m
    receivers:
      - name: "default"
        slack_configs:
          - channel: "#alerts"
            title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
            text: "{{ .CommonAnnotations.description }}"
      - name: "critical"
        slack_configs:
          - channel: "#critical"
            title: '[CRITICAL] {{ .CommonLabels.alertname }}'
            text: "{{ .CommonAnnotations.description }}"

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
